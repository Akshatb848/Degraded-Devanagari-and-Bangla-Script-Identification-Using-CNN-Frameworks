---
# AIOCR API Service
apiVersion: v1
kind: Service
metadata:
  name: aiocr-api
  namespace: aiocr
  labels:
    app: aiocr
    component: api
spec:
  selector:
    app: aiocr
    component: api
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 8000
  type: ClusterIP

---
# Ingress
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aiocr-ingress
  namespace: aiocr
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "20m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
spec:
  ingressClassName: nginx
  rules:
    - host: aiocr.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: aiocr-api
                port:
                  number: 80

---
# Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: aiocr
  labels:
    app: aiocr
