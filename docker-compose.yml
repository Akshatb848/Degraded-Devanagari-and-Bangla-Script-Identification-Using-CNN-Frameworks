version: "3.9"

services:
  # ─── Infrastructure ───────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: aiocr_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: aiocr_db
      POSTGRES_USER: aiocr
      POSTGRES_PASSWORD: aiocr_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aiocr"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: aiocr_redis
    restart: unless-stopped
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  chromadb:
    image: chromadb/chroma:latest
    container_name: aiocr_chromadb
    restart: unless-stopped
    environment:
      CHROMA_HOST: 0.0.0.0
      CHROMA_PORT: 8001
    volumes:
      - chroma_data:/chroma/chroma
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/v1/heartbeat"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ─── Application Services ─────────────────────────────────────

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: aiocr_api
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://aiocr:aiocr_password@postgres:5432/aiocr_db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      CHROMA_HOST: chromadb
      CHROMA_PORT: 8001
    volumes:
      - model_data:/app/saved_models
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    container_name: aiocr_worker
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://aiocr:aiocr_password@postgres:5432/aiocr_db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      CHROMA_HOST: chromadb
      CHROMA_PORT: 8001
    volumes:
      - model_data:/app/saved_models
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  flower:
    image: mher/flower:2.0
    container_name: aiocr_flower
    restart: unless-stopped
    environment:
      CELERY_BROKER_URL: redis://redis:6379/1
      FLOWER_PORT: 5555
    ports:
      - "5555:5555"
    depends_on:
      - redis

  nginx:
    image: nginx:alpine
    container_name: aiocr_nginx
    restart: unless-stopped
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
  chroma_data:
  model_data:

networks:
  default:
    name: aiocr_network
